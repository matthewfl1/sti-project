<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>STI Calculator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff; margin: 0; padding: 20px; color: #333; }
        .calc-box { max-width: 450px; margin: auto; border: 1px solid #e5e7eb; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h2 { color: #b30000; font-size: 16px; text-transform: uppercase; margin-top: 0; border-bottom: 2px solid #b30000; padding-bottom: 10px; letter-spacing: 1px; }
        label { display: block; margin: 15px 0 5px; font-size: 12px; font-weight: 800; text-transform: uppercase; color: #666; }
        input, select { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: #b30000; }
        .result-area { margin-top: 25px; background: #fef2f2; padding: 15px; border-radius: 4px; border: 1px solid #fee2e2; }
        .result-line { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
        .val { font-weight: 800; color: #b30000; }
        .btn-calc { width: 100%; background: #b30000; color: white; border: none; padding: 14px; margin-top: 20px; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s; }
        .btn-calc:hover { background: #8e0000; }
        #productList { height: 120px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="calc-box">
    <h2>Расчет параметров отгрузки</h2>
    
    <label>Поиск продукции (ГОСТ / Тип):</label>
    <input type="text" id="productSearch" placeholder="Введите название..." oninput="filterProducts()">
    <select id="productList" size="5" onclick="selectProduct()"></select>

    <label id="unitLabel">Количество:</label>
    <input type="number" id="quantity" value="1" min="1" oninput="calculate()">

    <div class="result-area">
        <div class="result-line">Итоговый вес: <span class="val" id="totalWeight">0.00 кг</span></div>
        <div class="result-line">Транспорт: <span class="val" id="truckType">Не определен</span></div>
    </div>
    
    <button class="btn-calc" onclick="calculate()">Рассчитать</button>
</div>

<script>
    let products = [];
    // ОБЯЗАТЕЛЬНО ЗАМЕНИ ЭТУ ССЫЛКУ НА СВОЮ CSV-ССЫЛКУ!
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTPrp8W7_50O237D4lB5w1n_eJ5eS_0D3n57_EXAMPLE/pub?output=csv';

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const text = await response.text();
            // Правильное разделение строк (учитываем переносы)
            const rows = text.split(/\r?\n/).slice(1); 
            
            products = rows.map(row => {
                // Разделение по запятым, но только если они не внутри кавычек
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 3) {
                    return {
                        name: cols[1].replace(/"/g, '').trim(),
                        weight: parseFloat(cols[2]),
                        unit: cols[3] ? cols[3].replace(/"/g, '').trim() : 'ед.'
                    };
                }
                return null;
            }).filter(p => p && !isNaN(p.weight));
            
            filterProducts();
        } catch (e) {
            console.error("Ошибка загрузки данных");
        }
    }

    function filterProducts() {
        const query = document.getElementById('productSearch').value.toLowerCase();
        const list = document.getElementById('productList');
        list.innerHTML = '';
        const filtered = products.filter(p => p.name.toLowerCase().includes(query));
        
        filtered.forEach(p => {
            let opt = document.createElement('option');
            opt.value = p.weight;
            opt.text = p.name;
            opt.dataset.unit = p.unit;
            list.add(opt);
        });
    }

    function selectProduct() {
        const list = document.getElementById('productList');
        if (list.selectedIndex === -1) return;
        const selected = list.options[list.selectedIndex];
        document.getElementById('productSearch').value = selected.text;
        document.getElementById('unitLabel').innerText = `Количество (${selected.dataset.unit}):`;
        calculate();
    }

    function calculate() {
        const list = document.getElementById('productList');
        if (list.selectedIndex === -1) return;

        const weightPerUnit = parseFloat(list.value);
        const qty = parseFloat(document.getElementById('quantity').value) || 0;
        const total = weightPerUnit * qty;
        
        document.getElementById('totalWeight').innerText = total.toFixed(2) + " кг";

        let truck = "Не определен";
        if (total > 0 && total <= 1500) truck = "ГАЗель (1.5т)";
        else if (total > 1500 && total <= 5000) truck = "Валдай (5т)";
        else if (total > 5000 && total <= 10000) truck = "КАМАЗ (10т)";
        else if (total > 10000 && total <= 21000) truck = "Еврофура (21т)";
        else if (total > 21000) truck = "Несколько машин";

        document.getElementById('truckType').innerText = truck;
    }

    loadData();
</script>
</body>
</html>
