<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; background: #fff; }
        .calc-box { border: 1px solid #ddd; border-radius: 8px; padding: 20px; max-width: 400px; margin: auto; }
        h2 { color: #b30000; font-size: 14px; border-bottom: 2px solid #b30000; padding-bottom: 8px; text-transform: uppercase; margin: 0 0 15px; }
        label { display: block; margin: 12px 0 5px; font-weight: bold; font-size: 11px; color: #666; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        #list { height: 100px; margin-top: 5px; }
        .res { margin-top: 20px; background: #fef2f2; padding: 15px; border-radius: 4px; border: 1px solid #fee2e2; }
        .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .val { font-weight: bold; color: #b30000; }
        .btn { width: 100%; background: #b30000; color: white; border: none; padding: 12px; margin-top: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="calc-box">
        <h2>Терминал расчета</h2>
        <label>Поиск в базе (ГОСТ):</label>
        <input type="text" id="s" placeholder="Введите название..." oninput="filter()">
        <select id="list" size="5" onclick="sel()"></select>
        <label id="uL">Количество:</label>
        <input type="number" id="q" value="1" min="1" oninput="calc()">
        <div class="res">
            <div class="row">Вес позиции: <span class="val" id="tw">0.00 кг</span></div>
            <div class="row">Транспорт: <span class="val" id="tr">Не определен</span></div>
        </div>
        <button class="btn" onclick="calc()">РАССЧИТАТЬ</button>
    </div>

    <script>
        let db = [];
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSYKUmtE5Idl6Jb5Le2Xrus-AV-9gdcDPHckyejXN4WKrfdR7qsMQmdv7mDoxXYVfwdFKQfBBTBeLsa/pub?output=csv';

        async function load() {
            try {
                const r = await fetch(url);
                const t = await r.text();
                const lines = t.split(/\r?\n/).filter(l => l.trim() !== "");
                db = lines.slice(1).map(l => {
                    const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        n: c[1]?.replace(/["']/g, "").trim(),
                        w: parseFloat(c[2]?.replace(",", ".").replace(/[^0-9.]/g, "")),
                        u: c[3]?.replace(/["']/g, "").trim() || "ед."
                    };
                }).filter(i => i.n && !isNaN(i.w));
                filter();
            } catch (e) { console.error("Ошибка базы"); }
        }

        function filter() {
            const query = document.getElementById('s').value.toLowerCase();
            const l = document.getElementById('list');
            l.innerHTML = '';
            db.filter(i => i.n.toLowerCase().includes(query)).forEach(i => {
                let o = document.createElement('option');
                o.value = i.w; o.text = i.n; o.dataset.u = i.u;
                l.add(o);
            });
        }

        function sel() {
            const l = document.getElementById('list');
            if (l.selectedIndex === -1) return;
            document.getElementById('s').value = l.options[l.selectedIndex].text;
            document.getElementById('uL').innerText = `Количество (${l.options[l.selectedIndex].dataset.u}):`;
            calc();
        }

        function calc() {
            const l = document.getElementById('list');
            if (l.selectedIndex === -1) return;
            const res = parseFloat(l.value) * (parseFloat(document.getElementById('q').value) || 0);
            document.getElementById('tw').innerText = res.toFixed(2) + " кг";
            let t = "Не определен";
            if (res > 0 && res <= 1500) t = "ГАЗель (1.5т)";
            else if (res <= 5000) t = "Валдай (5т)";
            else if (res <= 10000) t = "КАМАЗ (10т)";
            else if (res <= 21000) t = "Еврофура (21т)";
            else if (res > 21000) t = "Несколько ТС";
            document.getElementById('tr').innerText = t;
        }

        // ПРИЕМ СООБЩЕНИЙ ОТ САЙТА
        window.addEventListener('message', function(e) {
            if (e.data.type === 'setProduct') {
                document.getElementById('s').value = e.data.name;
                filter();
                // Автоматически выбираем первый найденный товар
                setTimeout(() => {
                    const l = document.getElementById('list');
                    if(l.options.length > 0) {
                        l.selectedIndex = 0;
                        sel();
                    }
                }, 100);
            }
        });

        load();
    </script>
</body>
</html>
