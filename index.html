<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>STI-Cloud ERP v6.0 | Автономная версия</title>
    <style>
        :root { --main: #ce1126; --dark: #2d3436; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #dfe6e9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 480px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-top: 10px solid var(--main); }
        .status-box { font-size: 13px; padding: 12px; border-radius: 8px; margin-bottom: 20px; background: #f8f9fa; border: 1px solid #ddd; font-weight: bold; text-align: center; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #636e72; font-size: 14px; }
        select, input { width: 100%; padding: 14px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; background: var(--main); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 4px 10px rgba(206, 17, 38, 0.3); }
        button:hover { background: #b00e20; transform: translateY(-1px); }
        .result { margin-top: 25px; padding: 20px; background: #fff5f5; border-radius: 10px; display: none; border: 1px solid #fed7d7; }
        .truck-info { margin-top: 15px; padding: 10px; background: var(--dark); color: white; border-radius: 8px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div id="status" class="status-box" style="color: #d63031;">⏳ Инициализация облака...</div>
    <h2>Расчет STI Group</h2>
    
    <label>Продукция из Google Таблицы:</label>
    <select id="productList" onchange="updateInfo()">
        <option>Загрузка данных...</option>
    </select>

    <label id="unitLabel">Количество:</label>
    <input type="number" id="quantity" placeholder="0.00">

    <button onclick="calculateLogistics()">Рассчитать заказ</button>

    <div id="resCard" class="result">
        <div style="font-size: 16px;">Масса груза: <strong id="weightResult">0</strong> кг</div>
        <div id="truckResult" class="truck-info"></div>
    </div>
</div>

<script>
    const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSYKUmtE5Idl6Jb5Le2Xrus-AV-9gdcDPHckyejXN4WKrfdR7qsMQmdv7mDoxXYVfwdFKQfBBTBeLsa/pub?output=csv';
    let database = [];

    // Используем динамический скрипт для обхода ограничений безопасности
    async function loadData() {
        const status = document.getElementById('status');
        try {
            // Используем fetch с отключенным кэшем
            const response = await fetch(SHEET_CSV + '&nocache=' + Date.now());
            if (!response.ok) throw new Error();
            
            const text = await response.text();
            parseCSV(text);
            
            status.innerText = "✅ СИНХРОНИЗИРОВАНО С ОБЛАКОМ";
            status.style.color = "#27ae60";
            status.style.borderColor = "#2ecc71";
        } catch (e) {
            status.innerText = "⚠️ Ошибка доступа. Нажмите кнопку ниже для активации:";
            // Добавляем кнопку принудительной загрузки, если fetch заблокирован
            const btn = document.createElement('button');
            btn.innerText = "Обновить вручную";
            btn.style.marginTop = "10px";
            btn.style.fontSize = "12px";
            btn.onclick = () => location.reload();
            status.appendChild(btn);
        }
    }

    function parseCSV(data) {
        const lines = data.split(/\r?\n/).filter(line => line.trim() !== "");
        const select = document.getElementById('productList');
        select.innerHTML = "";
        database = [];

        // Парсим со 2-й строки
        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(/[,;]/);
            if (cols.length >= 3) {
                const item = {
                    name: cols[1].replace(/"/g, ''),
                    weight: parseFloat(cols[2].replace(/"/g, '').replace(',', '.')),
                    unit: cols[3] ? cols[3].replace(/"/g, '') : 'шт'
                };
                database.push(item);
                select.add(new Option(item.name, item.weight));
            }
        }
        updateInfo();
    }

    function updateInfo() {
        const sel = document.getElementById('productList');
        if (database[sel.selectedIndex]) {
            document.getElementById('unitLabel').innerText = `Количество (${database[sel.selectedIndex].unit}):`;
        }
    }

    function calculateLogistics() {
        const q = parseFloat(document.getElementById('quantity').value);
        const w = parseFloat(document.getElementById('productList').value);
        if (!q) return alert("Укажите объем заказа");

        const totalW = (q * w).toFixed(2);
        document.getElementById('weightResult').innerText = totalW;
        
        let truck = "";
        if (totalW < 1500) truck = "🚚 ГАЗель (до 1.5т)";
        else if (totalW < 5000) truck = "🚛 Валдай / 5-тонник";
        else if (totalW < 20000) truck = "🚜 Еврофура (20т)";
        else truck = "🚜 Спецтехника (>20т)";

        document.getElementById('truckResult').innerText = truck;
        document.getElementById('resCard').style.display = 'block';
    }

    // Запуск
    window.onload = loadData;
</script>
</body>
</html>
