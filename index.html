<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #fff; color: #333; line-height: 1.5; }
        .calc-wrapper { max-width: 420px; margin: auto; border: 1px solid #ddd; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: #b30000; font-size: 17px; border-bottom: 2px solid #b30000; padding-bottom: 12px; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        label { display: block; margin: 18px 0 6px; font-weight: bold; font-size: 11px; color: #666; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        input:focus { border-color: #b30000; outline: none; }
        .res-block { margin-top: 25px; background: #fef2f2; padding: 18px; border-left: 5px solid #b30000; border-radius: 4px; }
        .res-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .res-val { font-weight: bold; color: #b30000; }
        .btn { width: 100%; background: #b30000; color: #fff; border: none; padding: 15px; margin-top: 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; border-radius: 4px; transition: 0.2s; }
        .btn:hover { background: #8e0000; }
        #list { height: 120px; margin-top: 5px; border-color: #eee; }
    </style>
</head>
<body>
<div class="calc-wrapper">
    <h2>Параметры отгрузки</h2>
    <label>Поиск по наименованию / ГОСТ:</label>
    <input type="text" id="search" placeholder="Введите название продукции..." oninput="filter()">
    <select id="list" size="5" onclick="sel()"></select>
    <label id="uL">Количество:</label>
    <input type="number" id="q" value="1" min="1" oninput="calc()">
    <div class="res-block">
        <div class="res-row">Теоретический вес: <span class="res-val" id="tw">0.00 кг</span></div>
        <div class="res-row">Тип транспорта: <span class="res-val" id="tr">Не определен</span></div>
    </div>
    <button class="btn" onclick="calc()">Выполнить расчет</button>
</div>
<script>
    let db = [];
    // ССЫЛКУ НИЖЕ ЗАМЕНИ НА СВОЮ
    const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS_D6UuVqNId2Siaf-E-qS0vP_L6G7oXj0oT_fE/pub?output=csv';

    async function load() {
        try {
            const r = await fetch(url);
            const t = await r.text();
            const lines = t.split(/\r?\n/).slice(1);
            db = lines.map(l => {
                const c = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (c.length < 3) return null;
                // Очистка от кавычек и пробелов
                const name = c[1].replace(/^"|"$/g, '').replace(/""/g, '"').trim();
                const weight = parseFloat(c[2].replace(',', '.').replace(/"/g, ''));
                const unit = c[3] ? c[3].replace(/"/g, '').trim() : 'ед.';
                return { n: name, w: weight, u: unit };
            }).filter(i => i && !isNaN(i.w) && i.n.length > 2);
            filter();
        } catch (e) { console.error("Ошибка загрузки данных из облака"); }
    }
    function filter() {
        const s = document.getElementById('search').value.toLowerCase();
        const l = document.getElementById('list');
        l.innerHTML = '';
        db.filter(i => i.n.toLowerCase().includes(s)).forEach(i => {
            let o = document.createElement('option');
            o.value = i.w; o.text = i.n; o.dataset.u = i.u;
            l.add(o);
        });
    }
    function sel() {
        const l = document.getElementById('list');
        if (l.selectedIndex === -1) return;
        document.getElementById('search').value = l.options[l.selectedIndex].text;
        document.getElementById('uL').innerText = `Количество (${l.options[l.selectedIndex].dataset.u}):`;
        calc();
    }
    function calc() {
        const l = document.getElementById('list');
        if (l.selectedIndex === -1) return;
        const total = parseFloat(l.value) * (parseFloat(document.getElementById('q').value) || 0);
        document.getElementById('tw').innerText = total.toLocaleString('ru-RU', {minimumFractionDigits: 2}) + " кг";
        let t = "Не определен";
        if (total > 0 && total <= 1500) t = "ГАЗель (1.5т)";
        else if (total > 1500 && total <= 5000) t = "Валдай (5т)";
        else if (total > 5000 && total <= 10000) t = "КАМАЗ (10т)";
        else if (total > 10000 && total <= 21000) t = "Еврофура (21т)";
        else if (total > 21000) t = "Требуется несколько ТС";
        document.getElementById('tr').innerText = t;
    }
    load();
</script>
</body>
</html>
