<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>STI Calculator Engine</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fff; margin: 0; padding: 15px; color: #333; }
        .calc-box { max-width: 450px; margin: auto; border: 1px solid #e5e7eb; padding: 20px; border-radius: 8px; }
        h2 { color: #b30000; font-size: 16px; text-transform: uppercase; margin-top: 0; border-bottom: 2px solid #b30000; padding-bottom: 10px; letter-spacing: 1px; }
        
        label { display: block; margin: 15px 0 5px; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #6b7280; }
        input, select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 4px; box-sizing: border-box; font-size: 14px; outline: none; }
        input:focus { border-color: #b30000; }
        
        #productList { height: 130px; margin-top: 5px; cursor: pointer; border-color: #f3f4f6; }
        #productList option { padding: 8px; border-bottom: 1px solid #f9fafb; }
        #productList option:checked { background-color: #fef2f2; color: #b30000; }

        .result-area { margin-top: 20px; background: #fef2f2; padding: 15px; border-radius: 6px; border: 1px solid #fee2e2; }
        .result-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .val { font-weight: 800; color: #b30000; }
        
        .btn-calc { width: 100%; background: #b30000; color: white; border: none; padding: 14px; margin-top: 15px; border-radius: 4px; cursor: pointer; font-weight: 700; text-transform: uppercase; transition: 0.2s; }
        .btn-calc:hover { background: #8e0000; }
    </style>
</head>
<body>

<div class="calc-box">
    <h2>Параметры отгрузки</h2>
    
    <label>Поиск номенклатуры (ГОСТ):</label>
    <input type="text" id="productSearch" placeholder="Введите название или номер ГОСТ..." oninput="filterProducts()">
    <select id="productList" size="5" onclick="selectProduct()"></select>

    <label id="unitLabel">Количество:</label>
    <input type="number" id="quantity" value="1" min="1" oninput="calculate()">

    <div class="result-area">
        <div class="result-line">Вес позиции: <span class="val" id="totalWeight">0.00 кг</span></div>
        <div class="result-line">Тип транспорта: <span class="val" id="truckType">Не определен</span></div>
    </div>
    
    <button class="btn-calc" onclick="calculate()">Рассчитать итог</button>
</div>

<script>
    let products = [];
    // ТВОЯ ССЫЛКА УЖЕ ВСТАВЛЕНА
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTPrp8W7_50O237D4lB5w1n_eJ5eS_0D3n57_EXAMPLE/pub?output=csv';

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const text = await response.text();
            
            // Чистим строки от "мусора" и разбиваем правильно
            const rows = text.split(/\r?\n/).slice(1); 
            
            products = rows.map(row => {
                // Сложный разбор CSV (игнорируем запятые внутри кавычек)
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 3) {
                    return {
                        name: cols[1].replace(/"/g, '').trim(),
                        weight: parseFloat(cols[2].replace(',', '.')),
                        unit: cols[3] ? cols[3].replace(/"/g, '').trim() : 'ед.'
                    };
                }
                return null;
            }).filter(p => p && !isNaN(p.weight));
            
            filterProducts();
        } catch (e) {
            console.error("Ошибка синхронизации с базой");
        }
    }

    function filterProducts() {
        const query = document.getElementById('productSearch').value.toLowerCase();
        const list = document.getElementById('productList');
        list.innerHTML = '';
        
        const filtered = products.filter(p => p.name.toLowerCase().includes(query));
        
        filtered.forEach(p => {
            let opt = document.createElement('option');
            opt.value = p.weight;
            opt.text = p.name;
            opt.dataset.unit = p.unit;
            list.add(opt);
        });
    }

    function selectProduct() {
        const list = document.getElementById('productList');
        if (list.selectedIndex === -1) return;
        const selected = list.options[list.selectedIndex];
        document.getElementById('productSearch').value = selected.text;
        document.getElementById('unitLabel').innerText = `Количество (${selected.dataset.unit}):`;
        calculate();
    }

    function calculate() {
        const list = document.getElementById('productList');
        if (list.selectedIndex === -1) return;

        const weightPerUnit = parseFloat(list.value);
        const qty = parseFloat(document.getElementById('quantity').value) || 0;
        const total = weightPerUnit * qty;
        
        document.getElementById('totalWeight').innerText = total.toLocaleString('ru-RU', {minimumFractionDigits: 2}) + " кг";

        let truck = "Не определен";
        if (total > 0 && total <= 1500) truck = "ГАЗель (1.5т)";
        else if (total > 1500 && total <= 5000) truck = "Валдай (5т)";
        else if (total > 5000 && total <= 10000) truck = "КАМАЗ (10т)";
        else if (total > 10000 && total <= 21000) truck = "Еврофура (21т)";
        else if (total > 21000) truck = "Требуется колонна ТС";

        document.getElementById('truckType').innerText = truck;
    }

    loadData();
</script>
</body>
</html>
