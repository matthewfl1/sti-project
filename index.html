<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор STI Group</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: white; margin: 0; padding: 20px; color: #333; }
        .calc-box { max-width: 500px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        h2 { color: #b30000; font-size: 18px; text-transform: uppercase; margin-top: 0; border-bottom: 2px solid #b30000; padding-bottom: 10px; }
        
        label { display: block; margin: 15px 0 5px; font-size: 13px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        
        .result-area { margin-top: 20px; background: #f9f9f9; padding: 15px; border-radius: 4px; border-left: 4px solid #b30000; }
        .result-line { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
        .val { font-weight: bold; color: #b30000; }
        
        .btn-calc { width: 100%; background: #b30000; color: white; border: none; padding: 12px; margin-top: 20px; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-calc:hover { background: #800000; }
    </style>
</head>
<body>

<div class="calc-box">
    <h2>Расчет параметров отгрузки</h2>
    
    <label>Выберите продукцию (ГОСТ):</label>
    <input type="text" id="productSearch" placeholder="Начните вводить название или ГОСТ..." oninput="filterProducts()">
    <select id="productList" size="5" style="margin-top:5px;" onclick="selectProduct()"></select>

    <label id="unitLabel">Количество (ед.):</label>
    <input type="number" id="quantity" value="1" min="1" oninput="calculate()">

    <div class="result-area">
        <div class="result-line">Теоретический вес: <span class="val" id="totalWeight">0.00 кг</span></div>
        <div class="result-line">Рекомендуемый транспорт: <span class="val" id="truckType">Не определен</span></div>
    </div>
    
    <button class="btn-calc" onclick="calculate()">Пересчитать</button>
</div>

<script>
    let products = [];
    const SHEET_URL = 'ССЫЛКА_НА_ТВОЙ_CSV'; // ЗАМЕНИ НА СВОЮ

    async function loadData() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            products = rows.map(row => {
                const cols = row.split(',');
                return { name: cols[1], weight: parseFloat(cols[2]), unit: cols[3] };
            }).filter(p => p.name);
            filterProducts();
        } catch (e) { console.error("Ошибка загрузки БД"); }
    }

    function filterProducts() {
        const query = document.getElementById('productSearch').value.toLowerCase();
        const list = document.getElementById('productList');
        list.innerHTML = '';
        products.filter(p => p.name.toLowerCase().includes(query)).forEach(p => {
            let opt = document.createElement('option');
            opt.value = p.weight;
            opt.text = p.name;
            opt.dataset.unit = p.unit;
            list.add(opt);
        });
    }

    function selectProduct() {
        const list = document.getElementById('productList');
        document.getElementById('productSearch').value = list.options[list.selectedIndex].text;
        document.getElementById('unitLabel').innerText = `Количество (${list.options[list.selectedIndex].dataset.unit}):`;
        calculate();
    }

    function calculate() {
        const list = document.getElementById('productList');
        if (list.selectedIndex === -1) return;

        const weightPerUnit = parseFloat(list.value);
        const qty = parseFloat(document.getElementById('quantity').value) || 0;
        const total = weightPerUnit * qty;
        
        document.getElementById('totalWeight').innerText = total.toFixed(2) + " кг";

        let truck = "Не определен";
        if (total > 0 && total <= 1500) truck = "ГАЗель (до 1.5т)";
        else if (total > 1500 && total <= 5000) truck = "ГАЗон / Валдай (до 5т)";
        else if (total > 5000 && total <= 10000) truck = "КАМАЗ (до 10т)";
        else if (total > 10000 && total <= 21000) truck = "Еврофура (до 21т)";
        else if (total > 21000) truck = "Требуется несколько ТС";

        document.getElementById('truckType').innerText = truck;
    }

    loadData();
</script>

</body>
</html>
